<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 190" role="img" aria-labelledby="title desc">
  <title id="title">Swift's Valets</title>
  <desc id="desc">Gold Swift's Valets wordmark with a stylised swift shape.</desc>
  <defs>
    <linearGradient id="swiftGold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff2a6" />
      <stop offset="0.42" stop-color="#e3b633" />
      <stop offset="1" stop-color="#8a650d" />
    </linearGradient>
    <linearGradient id="swiftRed" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ff3d2f" />
      <stop offset="1" stop-color="#d70f12" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-30%" width="140%" height="160%">
